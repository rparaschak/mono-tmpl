services:
  postgres:
    image: supabase/postgres:17.4.1.036
    ports:
      - "5102:5432"
    environment:
      POSTGRES_USER: "supabase_admin"
      POSTGRES_PASSWORD: "docker"
      POSTGRES_DB: "mono-tmpl-test"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supabase_admin -d mono-tmpl-test"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: server /data --console-address ":9001"
    ports:
      - "5104:9000"
      - "5105:9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - minio-test-data:/data

volumes:
  postgres-test-data:
  minio-test-data:
