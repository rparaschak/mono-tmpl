services:
  postgres:
    image: supabase/postgres:17.4.1.036
    ports:
      - "5102:5432"
    environment:
      POSTGRES_USER: "supabase_admin"
      POSTGRES_PASSWORD: "docker"
      POSTGRES_DB: "mono-tmpl-test"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supabase_admin -d mono-tmpl-test"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

volumes:
  postgres-test-data:
